        <meta name="theme-color" content="indigo" />
        <meta name="robots" content="noindex" />
        <link href="originalgolf.svg" rel="icon" type="image/x-icon" />
        <link rel="apple-touch-icon" sizes="180x180" href="originalgolf.svg" />
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
        <link
            href="https://fonts.googleapis.com/css?family=Kalam"
            rel="stylesheet"
        />
        <style>
            * {
                margin: 0;
                padding: 0;
            }

            html {
                background: black;
                height: 100vh;
            }

            body {
                overflow: hidden;
                height: 100vh;

                //background: black;
                animation-name: grow;
                animation-duration: 2s;

                transform-origin: left top;
            }

            @keyframes grow {
                0% {
                    transform: scale(0.1);
                }
                100% {
                    transform: scale(1);
                }
            }

            ::-webkit-scrollbar {
                display: none;
            }

            #turkey,
            #cardrona,
            #spain,
            #jimstamas {
                padding: 5vw;
                font-family: "arial";
                font-size: 5vw;
                color: white;
            }
        </style>
    </head>

    <body oncontextmenu="return false;" onload="showPhoto()">
        <div id="turkey"></div>
        <br />
        <div id="cardrona"></div>
        <br />
        <div id="jimstamas"></div>
        <br />
        <div id="spain"></div>

        <div id="warning">Not available in landscape orientation</div>

        <script>
            // Detect whether device supports orientationchange event, otherwise fall back to
            // the resize event.
            var supportsOrientationChange = "onorientationchange" in window,
                orientationEvent = supportsOrientationChange
                    ? "orientationchange"
                    : "resize";

            window.addEventListener(
                orientationEvent,
                function () {
                    if (window.orientation == 0) {
                        document.getElementById("warning").style.display =
                            "none";
                    } else if (
                        window.orientation == 90 ||
                        window.orientation == -90
                    ) {
                        document.getElementById("warning").style.display =
                            "block";
                    }
                },
                false,
            );

            function countdown1() {
                // Set the date we're counting down to
                var countDownDate = new Date("Mar 20, 2026 00:00:00").getTime();

                // Update the count down every 1 second
                var x = setInterval(function () {
                    // Get today's date and time
                    var now = new Date().getTime();

                    // Find the distance between now and the count down date
                    var distance = countDownDate - now;

                    // Time calculations for days, hours, minutes and seconds
                    var days = Math.floor(distance / (1000 * 60 * 60 * 24));
                    var hours = Math.floor(
                        (distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
                    );
                    var minutes = Math.floor(
                        (distance % (1000 * 60 * 60)) / (1000 * 60),
                    );
                    var seconds = Math.floor((distance % (1000 * 60)) / 1000);

                    // Output the result in an element with id="turkey"
                    document.getElementById("turkey").innerHTML =
                        "Turkey: " +
                        days +
                        "d " +
                        hours +
                        "h " +
                        minutes +
                        "m " +
                        seconds +
                        "s ";

                    // If the count down is over, write some text
                    if (distance < 0) {
                        clearInterval(x);
                        document.getElementById("turkey").innerHTML = "EXPIRED";
                    }
                }, 1000);
            }
